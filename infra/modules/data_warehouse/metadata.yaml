apiVersion: blueprints.cloud.google.com/v1alpha1
kind: BlueprintMetadata
metadata:
  name: terraform-ml-image-annotation-gcf-bigquery
  annotations:
    config.kubernetes.io/local-config: "true"
spec:
  info:
    title: terraform-ml-image-annotation-gcf-bigquery
    source:
      repo: https://github.com/GoogleCloudPlatform/terraform-ml-image-annotation-gcf.git
      sourceType: git
      dir: /infra/modules/data_warehouse
    version: 7.0.0
    actuationTool:
      flavor: Terraform
      version: ">= 0.13"
    description: {}
  content:
    examples:
    - name: simple_example
      location: examples/simple_example
  interfaces:
    variables:
      - name: deletion_protection
        description: Whether or not to protect GCS resources from deletion when solution is modified or changed.
        varType: string
        defaultValue: true
      - name: enable_apis
        description: Whether or not to enable underlying apis in this solution.
        varType: string
        defaultValue: true
      - name: force_destroy
        description: Whether or not to protect BigQuery resources from deletion when solution is modified or changed.
        varType: string
        defaultValue: false
      - name: labels
        description: A map of labels to apply to contained resources.
        varType: map(string)
        defaultValue:
          data-warehouse: true
      - name: project_id
        description: Google Cloud Project ID
        varType: string
        defaultValue: null
        required: true
      - name: region
        description: Google Cloud Region
        varType: string
        defaultValue: null
        required: true
    outputs:
      - name: bigquery_editor_url
        description: The URL to launch the BigQuery editor with the sample query procedure opened
      - name: ds_friendly_name
        description: Dataset name
  requirements:
    roles:
      - level: Project
        roles:
          - roles/bigquery.admin
          - roles/owner
    services:
      - cloudresourcemanager.googleapis.com
      - bigquery.googleapis.com
      - bigquerystorage.googleapis.com
      - serviceusage.googleapis.com
      - iam.googleapis.com
